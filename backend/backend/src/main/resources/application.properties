spring.application.name=study-planner

# MySQL (XAMPP) - create schema 'studyplanner' in phpMyAdmin first
spring.datasource.url=jdbc:mysql://localhost:3306/studyplanner?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=study-planner-secret-key-change-this-make-it-at-least-256-bits-long-for-security
app.jwt.expiration-ms=86400000

# CORS (for React later)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
